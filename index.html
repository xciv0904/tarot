<script>
/* Astronomy Engine is kept as a local, version-pinned asset and loaded only when
   a natal/synastry calculation is actually needed. This keeps the reading and
   library screens independent from third-party network availability. */
var astronomyLoadPromise = null;
function ensureAstronomyLoaded() {
  if (window.Astronomy) return Promise.resolve(window.Astronomy);
  if (astronomyLoadPromise) return astronomyLoadPromise;
  astronomyLoadPromise = new Promise(function (resolve, reject) {
    var script = document.createElement('script');
    script.src = 'assets/vendor/astronomy-engine-2.1.19.min.js';
    script.async = true;
    script.onload = function () {
      if (window.Astronomy) resolve(window.Astronomy);
      else reject(new Error('Astronomy Engine loaded without global API'));
    };
    script.onerror = function () { reject(new Error('Astronomy Engine failed to load')); };
    document.head.appendChild(script);
  }).catch(function (err) {
    astronomyLoadPromise = null;
    throw err;
  });
  return astronomyLoadPromise;
}


/* 西洋占星資料檔（astrology-*.js）只在使用者切到「星盤」分頁時才動態載入，
   做法跟上面 Astronomy Engine 的按需載入一致——首頁與占卜分頁不需要用到
   這些資料，延後載入可以縮短第一次進站時要處理的程式碼量。 */
var astrologyDataLoadPromise = null;
var ASTROLOGY_DATA_FILES = [
  'js/data/astrology-core-data.js',
  'js/data/astrology-points-data.js',
  'js/data/astrology-placement-templates.js',
  'js/data/astrology-aspect-data.js'
];
function ensureAstrologyDataLoaded() {
  if (window.PLANET_DEFS) return Promise.resolve();
  if (astrologyDataLoadPromise) return astrologyDataLoadPromise;
  astrologyDataLoadPromise = ASTROLOGY_DATA_FILES.reduce(function (chain, src) {
    return chain.then(function () {
      return new Promise(function (resolve, reject) {
        var script = document.createElement('script');
        script.src = src;
        script.onload = function () { resolve(); };
        script.onerror = function () { reject(new Error('Failed to load ' + src)); };
        document.head.appendChild(script);
      });
    });
  }, Promise.resolve()).catch(function (err) {
    astrologyDataLoadPromise = null;
    throw err;
  });
  return astrologyDataLoadPromise;
}
</script>
